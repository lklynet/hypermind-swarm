name: Build

on:
  workflow_call:
    inputs:
      push-to-registry:
        description: "Whether to push images to the container registry"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
            test: true
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-latest
            test: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to the Container registry
        if: inputs.push-to-registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: inputs.push-to-registry
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build Docker image for testing
        if: matrix.test
        id: build-test
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: hypermind-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container for testing
        if: matrix.test
        run: >-
          docker run -d --name hypermind-test
          -e PORT=3000
          -e POW_PREFIX=0
          -e VERIFICATION_POW_PREFIX=0
          -e WEB_AUTH=ci:legacy
          -e WEB_ALLOWED_HOSTS=localhost:3000,127.0.0.1:3000
          -p 3000:3000
          hypermind-test:${{ github.sha }}

      - name: Wait for server to be ready
        if: matrix.test
        run: |
          for i in {1..90}; do
            if curl -sf http://localhost:3000/api/health; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/90)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Print Docker container logs for debugging
        if: failure() && matrix.test
        run: |
          docker ps -a || true
          docker inspect hypermind-test || true
          docker logs hypermind-test || true

      - name: Verify API response
        if: matrix.test
        run: |
          response=$(curl -sf http://localhost:3000/api/health)
          echo "Response: $response"
          # Check if response is valid JSON and has expected fields
          echo "$response" | jq -e '.status != null'

      - name: Cleanup test container
        if: always() && matrix.test
        run: docker rm -f hypermind-test || true

      - name: Verify existing storage upgrade
        if: matrix.test
        run: ./scripts/test-docker-storage-upgrade.sh hypermind-test:${{ github.sha }}

      - name: Build and push by digest
        if: inputs.push-to-registry
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        if: inputs.push-to-registry
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.push-to-registry
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
