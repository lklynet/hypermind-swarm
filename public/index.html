<!DOCTYPE html>
<html>
<head>
    <title>Hypermind-Swarm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Hypermind-Swarm</h1>
            <div class="stats">
                <span id="peer-count">0</span> Peers | 
                <span id="my-id">...</span>
            </div>
        </header>

        <div class="compose-area">
            <textarea id="tweet-input" placeholder="What's happening? (Max 280 chars)" maxlength="280"></textarea>
            <button id="tweet-btn">Tweet</button>
        </div>

        <div id="feed" class="feed">
            <!-- Tweets go here -->
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
