<!DOCTYPE html>
<html>
  <head>
    <title>Hypermind-Swarm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/hypermind.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=4" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="header-brand" onclick="showFeed()" style="cursor: pointer">
          <img src="/hypermind.svg" alt="Hypermind Logo" class="logo" />
          <div class="header-text">
            <h1>Hypermind-Swarm</h1>
            <div class="powered-by">
              Powered by
              <a
                href="https://github.com/lklynet/hypermind"
                target="_blank"
                onclick="event.stopPropagation()"
                >hypermind</a
              >
            </div>
          </div>
        </div>
        <div class="stats">
          <div id="connection-status" class="connection-status">
            <span id="status-dot" class="status-dot connecting"></span>
            <span id="status-text">connecting...</span>
          </div>
          <span class="separator">|</span>
          <span id="my-id" style="cursor: pointer">...</span>
        </div>
      </header>

      <div class="app-layout">
        <main class="main-content">
          <div class="compose-area">
            <textarea
              id="ping-input"
              placeholder="What's happening? (Max 280 chars)"
              maxlength="280"
            ></textarea>
            <div
              class="compose-actions"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <span
                id="char-count"
                style="color: var(--secondary-text); font-size: 0.9rem"
                >0/280</span
              >
              <button id="ping-btn">Ping</button>
            </div>
          </div>

          <div id="feed" class="feed">
            <!-- Pings go here -->
          </div>

          <div id="profile-view" class="profile-view" style="display: none">
            <div class="profile-header">
              <button class="back-btn" onclick="showFeed()">
                <i class="fa-solid fa-arrow-left"></i> Back
              </button>
              <div id="profile-info"></div>
            </div>
            <div id="profile-feed" class="feed"></div>
          </div>
        </main>

        <aside class="sidebar">
          <div class="sidebar-section swarm-controls" id="section-swarms">
            <h3 class="sidebar-title" onclick="toggleSection('swarms')">
              Swarms
              <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </h3>
            <div class="section-content">
              <div class="swarm-input-container">
                <input
                  type="text"
                  id="swarm-input"
                  placeholder="Join swarm..."
                />
                <button id="join-swarm-btn" title="Join Swarm">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
              <div
                id="active-swarms"
                style="
                  font-size: 0.9rem;
                  color: var(--secondary-text);
                  display: flex;
                  flex-direction: column;
                  gap: 0.5rem;
                "
              >
                <!-- Active swarms list -->
              </div>
            </div>
          </div>

          <div class="sidebar-section" id="section-followed">
            <h3 class="sidebar-title" onclick="toggleSection('followed')">
              Followed
              <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </h3>
            <div class="section-content">
              <div id="followed-accounts-list" class="followed-accounts-list">
                <!-- Followed accounts will be injected here -->
              </div>
            </div>
          </div>

          <div class="sidebar-section" id="section-trending">
            <h3
              id="trending-title"
              class="sidebar-title"
              onclick="toggleSection('trending')"
            >
              Trending
              <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </h3>
            <div class="section-content">
              <div id="trending-list" class="trending-list">
                <!-- Trending topics will be injected here -->
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
