<!DOCTYPE html>
<html>
  <head>
    <title>Hypermind-Swarm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/hypermind.svg" type="image/svg+xml" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>
          <img src="/hypermind.svg" alt="Hypermind Logo" />
          Hypermind-Swarm
        </h1>
        <div class="stats">
          <div id="connection-status" class="connection-status">
            <span id="status-dot" class="status-dot connecting"></span>
            <span id="status-text">connecting...</span>
          </div>
          <span class="separator">|</span>
          <span id="my-id">...</span>
        </div>
      </header>

      <div class="compose-area">
        <textarea
          id="ping-input"
          placeholder="What's happening? (Max 280 chars)"
          maxlength="280"
        ></textarea>
        <button id="ping-btn">Ping</button>
      </div>

      <div id="feed" class="feed">
        <!-- Pings go here -->
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
