<!DOCTYPE html>
<html>
  <head>
    <title>Hypermind-Swarm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/hypermind.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=4" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="header-brand">
          <img src="/hypermind.svg" alt="Hypermind Logo" class="logo" />
          <div class="header-text">
            <h1>Hypermind-Swarm</h1>
            <div class="powered-by">
              Powered by
              <a href="https://github.com/lklynet/hypermind" target="_blank"
                >hypermind</a
              >
            </div>
          </div>
        </div>
        <div class="stats">
          <div id="connection-status" class="connection-status">
            <span id="status-dot" class="status-dot connecting"></span>
            <span id="status-text">connecting...</span>
          </div>
          <span class="separator">|</span>
          <span id="my-id">...</span>
        </div>
      </header>

      <div class="app-layout">
        <main class="main-content">
          <div class="compose-area">
            <textarea
              id="ping-input"
              placeholder="What's happening? (Max 280 chars)"
              maxlength="280"
            ></textarea>
            <div
              class="compose-actions"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <span
                id="char-count"
                style="color: var(--secondary-text); font-size: 0.9rem"
                >0/280</span
              >
              <button id="ping-btn">Ping</button>
            </div>
          </div>

          <div id="feed" class="feed">
            <!-- Pings go here -->
          </div>

          <div id="profile-view" class="profile-view" style="display: none">
            <div class="profile-header">
              <button class="back-btn" onclick="showFeed()">
                <i class="fa-solid fa-arrow-left"></i> Back
              </button>
              <div id="profile-info"></div>
            </div>
            <div id="profile-feed" class="feed"></div>
          </div>

        </main>

        <aside class="sidebar">
          <div class="sidebar-section swarm-controls">
            <h3 class="sidebar-title">Swarms</h3>
            <div class="swarm-input-container">
              <input
                type="text"
                id="swarm-input"
                placeholder="Join swarm..."
              />
              <button id="join-swarm-btn" title="Join Swarm">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
            <div
              id="active-swarms"
              style="
                font-size: 0.9rem;
                color: var(--secondary-text);
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
              "
            >
              <!-- Active swarms list -->
            </div>
          </div>

          <div class="sidebar-section">
            <h3 id="trending-title" class="sidebar-title">Trending</h3>
            <div id="trending-list" class="trending-list">
              <!-- Trending topics will be injected here -->
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
